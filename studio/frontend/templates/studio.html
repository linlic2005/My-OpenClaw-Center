<!doctype html>
<html lang="{{ default_lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/studio.css') }}" />
  </head>
  <body data-theme="{{ default_theme }}" data-lang="{{ default_lang }}">
    <div class="studio-page">
      <header class="studio-topbar">
        <div>
          <div class="studio-kicker">OPENCLAW STUDIO</div>
          <h1 data-i18n="title">工作室</h1>
          <p class="studio-copy" data-i18n="subtitle">
            通过像素工作室查看 Agent 的实时状态。
          </p>
        </div>
        <div class="studio-actions">
          <div class="studio-chip" id="service-status">LIVE</div>
          <select id="lang-select" class="studio-select">
            <option value="zh-CN">中文</option>
            <option value="en-US">English</option>
          </select>
        </div>
      </header>

      <section class="studio-summary">
        <div class="summary-card">
          <span class="summary-label" data-i18n="agents_online">在线 Agent</span>
          <strong id="agent-count">0</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label" data-i18n="last_sync">最后同步</span>
          <strong id="last-sync">--</strong>
        </div>
      </section>

      <main class="studio-layout">
        <section class="studio-stage">
          <div class="zone-grid">
            <article class="zone-card zone-lounge" data-zone="idle">
              <div class="zone-title" data-i18n="zone_idle">休息区</div>
              <div class="zone-agents" id="zone-idle"></div>
            </article>
            <article class="zone-card zone-writing" data-zone="writing">
              <div class="zone-title" data-i18n="zone_writing">写作位</div>
              <div class="zone-agents" id="zone-writing"></div>
            </article>
            <article class="zone-card zone-researching" data-zone="researching">
              <div class="zone-title" data-i18n="zone_researching">检索位</div>
              <div class="zone-agents" id="zone-researching"></div>
            </article>
            <article class="zone-card zone-executing" data-zone="executing">
              <div class="zone-title" data-i18n="zone_executing">执行位</div>
              <div class="zone-agents" id="zone-executing"></div>
            </article>
            <article class="zone-card zone-syncing" data-zone="syncing">
              <div class="zone-title" data-i18n="zone_syncing">同步站</div>
              <div class="zone-agents" id="zone-syncing"></div>
            </article>
            <article class="zone-card zone-error" data-zone="error">
              <div class="zone-title" data-i18n="zone_error">异常区</div>
              <div class="zone-agents" id="zone-error"></div>
            </article>
          </div>
        </section>

        <aside class="studio-sidebar">
          <section class="panel-card">
            <div class="panel-title" data-i18n="guide_title">区域说明</div>
            <div class="guide-list" id="guide-list"></div>
          </section>

          <section class="panel-card">
            <div class="panel-title" data-i18n="notes_title">当前便签</div>
            <div class="note-list" id="note-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <script>
      window.__STUDIO_BOOT__ = {
        lang: "{{ default_lang }}",
        theme: "{{ default_theme }}",
        version: "{{ version }}"
      };
    </script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pixel-art.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
  </html>
